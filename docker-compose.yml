services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: "*"
    image: polymarket-crypto-paper
    container_name: polymarket-crypto-paper
    ports:
      - "${APP_PORT:-50003}:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    volumes:
      - ${CONFIG_PATH:-./config}:/app/config:ro
      - ${DATA_PATH:-./data}:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/auth"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
